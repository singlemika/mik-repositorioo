<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kariboka — Cardápio</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --ve:#0d2b1a;--vf:#122e1e;--vm:#1a4d2e;--vv:#2d7a4f;--vc:#4caf7d;--vb:#6fcf97;
  --do:#c9a84c;--dc:#f0c96e;--cr:#f5f0e8;--ce:#e8ddc8;--tc:#d4e8d4;
}
html,body{min-height:100vh;background:var(--vf);color:var(--cr);font-family:'Crimson Pro',Georgia,serif;overflow-x:hidden}
nav{background:rgba(13,43,26,0.97);border-bottom:1px solid rgba(201,168,76,0.25);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-family:'Cinzel Decorative',cursive;color:var(--do);letter-spacing:3px;font-size:1.1rem}
.logo small{color:rgba(212,232,212,0.5);font-family:'Crimson Pro',serif;font-size:0.7rem;display:block;letter-spacing:4px;text-transform:uppercase;font-style:italic}
.carrinho-btn{position:relative;background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.35);color:var(--dc);padding:9px 18px;border-radius:2px;font-family:'Crimson Pro',serif;font-size:0.85rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;gap:8px}
.carrinho-btn:hover{background:rgba(201,168,76,0.22)}
.badge{background:var(--do);color:var(--ve);border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;font-family:sans-serif;transition:transform 0.2s}
.tabs{display:flex;background:rgba(13,43,26,0.5);border-bottom:1px solid rgba(201,168,76,0.12);padding:0 24px}
.tab{padding:13px 24px;font-family:'Crimson Pro',serif;font-size:0.88rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;color:rgba(212,232,212,0.45);border-bottom:2px solid transparent;transition:all 0.3s;background:none;border-left:none;border-right:none;border-top:none}
.tab.active{color:var(--do);border-bottom-color:var(--do)}
.hero-mini{background:radial-gradient(ellipse at 50% 100%,rgba(45,122,79,0.2),transparent 70%),linear-gradient(180deg,#060f09,var(--ve));padding:40px 24px 30px;text-align:center}
.hero-mini h1{font-family:'Cinzel Decorative',cursive;font-size:clamp(2rem,8vw,3.5rem);color:#fff;letter-spacing:8px;text-shadow:0 0 40px rgba(111,207,151,0.2);margin-bottom:6px}
.hero-mini p{font-style:italic;color:rgba(212,232,212,0.6);font-size:1rem;letter-spacing:2px}
main{padding:24px}
.panel{display:none}
.panel.active{display:block}
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px}
.item-card{background:rgba(10,31,18,0.85);border:1px solid rgba(201,168,76,0.18);border-radius:3px;overflow:hidden;transition:transform 0.35s,box-shadow 0.35s}
.item-card:hover{transform:translateY(-5px);box-shadow:0 16px 40px rgba(0,0,0,0.5),0 0 0 1px rgba(201,168,76,0.3)}
.card-img{width:100%;height:155px;object-fit:cover;display:block;filter:brightness(0.82) saturate(1.1);transition:transform 0.5s}
.item-card:hover .card-img{transform:scale(1.05)}
.card-img-ph{width:100%;height:155px;background:rgba(26,77,46,0.25);display:flex;align-items:center;justify-content:center;color:rgba(212,232,212,0.12);font-size:2.5rem}
.card-body{padding:14px 16px 16px}
.card-cat{font-size:0.65rem;letter-spacing:4px;text-transform:uppercase;color:var(--vc);margin-bottom:5px}
.card-nome{font-family:'Cinzel Decorative',cursive;font-size:0.9rem;color:var(--cr);margin-bottom:5px;line-height:1.3}
.card-desc{font-style:italic;font-size:0.82rem;color:rgba(212,232,212,0.48);line-height:1.5;margin-bottom:12px}
.card-footer{display:flex;align-items:center;justify-content:space-between}
.card-preco{font-family:'Cinzel Decorative',cursive;font-size:1rem;color:var(--dc)}
.btn-add-card{background:rgba(26,77,46,0.6);border:1px solid rgba(76,175,125,0.3);color:var(--vb);padding:6px 14px;border-radius:2px;font-family:'Crimson Pro',serif;font-size:0.78rem;letter-spacing:2px;cursor:pointer;transition:all 0.25s}
.btn-add-card:hover{background:rgba(76,175,125,0.2);border-color:var(--vc)}
.vazio{text-align:center;font-style:italic;color:rgba(212,232,212,0.3);padding:60px 20px;grid-column:1/-1;border:1px dashed rgba(201,168,76,0.15);border-radius:3px}
.drawer-bg{display:none;position:fixed;inset:0;background:rgba(6,15,9,0.8);z-index:200}
.drawer-bg.show{display:block}
.drawer{position:fixed;right:0;top:0;bottom:0;width:min(420px,100vw);background:var(--ve);border-left:1px solid rgba(201,168,76,0.25);z-index:201;display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.4s cubic-bezier(0.4,0,0.2,1)}
.drawer.open{transform:translateX(0)}
.drawer-head{padding:20px 24px;border-bottom:1px solid rgba(201,168,76,0.18);display:flex;align-items:center;justify-content:space-between}
.drawer-head h2{font-family:'Cinzel Decorative',cursive;font-size:1rem;color:var(--cr);letter-spacing:2px}
.btn-fechar{background:none;border:none;color:rgba(212,232,212,0.4);font-size:1.4rem;cursor:pointer;transition:color 0.2s;padding:4px}
.btn-fechar:hover{color:var(--cr)}
.drawer-items{flex:1;overflow-y:auto;padding:16px 24px}
.drawer-items::-webkit-scrollbar{width:4px}
.drawer-items::-webkit-scrollbar-track{background:rgba(26,77,46,0.2)}
.drawer-items::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.3);border-radius:2px}
.cart-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(201,168,76,0.1)}
.cart-item:last-child{border-bottom:none}
.cart-img{width:52px;height:52px;object-fit:cover;border-radius:2px;flex-shrink:0;filter:brightness(0.85)}
.cart-img-ph{width:52px;height:52px;background:rgba(26,77,46,0.3);border-radius:2px;display:flex;align-items:center;justify-content:center;color:rgba(212,232,212,0.15);font-size:1.2rem;flex-shrink:0}
.cart-info{flex:1;min-width:0}
.cart-nome{font-family:'Cinzel Decorative',cursive;font-size:0.82rem;color:var(--cr);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-preco{font-size:0.85rem;color:var(--dc)}
.cart-qty{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.qty-btn{background:rgba(26,77,46,0.5);border:1px solid rgba(76,175,125,0.25);color:var(--vb);width:26px;height:26px;border-radius:2px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.qty-btn:hover{background:rgba(76,175,125,0.2)}
.qty-num{font-family:'Cinzel Decorative',cursive;font-size:0.9rem;color:var(--cr);min-width:20px;text-align:center}
.drawer-form{padding:16px 24px;border-top:1px solid rgba(201,168,76,0.18);background:rgba(10,25,15,0.6)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.campo-cli label{font-size:0.68rem;letter-spacing:3px;text-transform:uppercase;color:var(--do);display:block;margin-bottom:4px}
.campo-cli input{width:100%;background:rgba(26,77,46,0.35);border:1px solid rgba(76,175,125,0.2);border-radius:2px;padding:9px 12px;color:var(--cr);font-family:'Crimson Pro',serif;font-size:0.95rem;outline:none;transition:border-color 0.3s}
.campo-cli input:focus{border-color:var(--do)}
.total-line{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding:10px 0;border-top:1px solid rgba(201,168,76,0.15);border-bottom:1px solid rgba(201,168,76,0.15)}
.total-label{font-size:0.75rem;letter-spacing:4px;text-transform:uppercase;color:rgba(212,232,212,0.5)}
.total-valor{font-family:'Cinzel Decorative',cursive;font-size:1.3rem;color:var(--dc)}
.btn-wpp{width:100%;padding:13px;background:transparent;border:1px solid #25d366;color:#25d366;font-family:'Crimson Pro',serif;font-size:0.95rem;letter-spacing:3px;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all 0.35s;display:flex;align-items:center;justify-content:center;gap:10px;position:relative;overflow:hidden}
.btn-wpp::before{content:'';position:absolute;inset:0;background:#25d366;transform:scaleX(0);transform-origin:left;transition:transform 0.35s;z-index:0}
.btn-wpp:hover{color:var(--ve)}
.btn-wpp:hover::before{transform:scaleX(1)}
.btn-wpp span,.btn-wpp svg{position:relative;z-index:1}
.carrinho-vazio{text-align:center;padding:40px 20px;color:rgba(212,232,212,0.3);font-style:italic}
</style>
</head>
<body>
<nav>
  <div class="logo">KARIBOKA <small>Parintins, AM</small></div>
  <button class="carrinho-btn" onclick="abrirCarrinho()">
    🛒 Carrinho
    <div class="badge" id="cart-badge">0</div>
  </button>
</nav>
<div class="hero-mini">
  <h1>KARIBOKA</h1>
  <p>Floresta Amazônica · Parintins</p>
</div>
<div class="tabs">
  <button class="tab active" onclick="trocarTab('comidas',this)">🍽 Comidas</button>
  <button class="tab" onclick="trocarTab('bebidas',this)">🍹 Bebidas</button>
</div>
<main>
  <div id="panel-comidas" class="panel active">
    <div class="items-grid" id="grid-comidas"></div>
  </div>
  <div id="panel-bebidas" class="panel">
    <div class="items-grid" id="grid-bebidas"></div>
  </div>
</main>
<div class="drawer-bg" id="drawer-bg" onclick="fecharCarrinho()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <h2>✦ Meu Pedido</h2>
    <button class="btn-fechar" onclick="fecharCarrinho()">✕</button>
  </div>
  <div class="drawer-items" id="drawer-items"></div>
  <div class="drawer-form">
    <div class="form-row">
      <div class="campo-cli"><label>Seu Nome</label><input type="text" id="cli-nome" placeholder="Ex: João Silva"></div>
      <div class="campo-cli"><label>Nº da Mesa</label><input type="number" id="cli-mesa" placeholder="Ex: 5" min="1"></div>
    </div>
    <div class="total-line">
      <span class="total-label">Total</span>
      <span class="total-valor" id="total-val">R$ 0,00</span>
    </div>
    <button class="btn-wpp" onclick="enviarWhatsApp()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      <span>Enviar Pedido</span>
    </button>
  </div>
</div>
<script>
// ============================================================
// ⚠️ COLOQUE SEU NÚMERO DE WHATSAPP AQUI (somente números)
// Exemplo: '5592999999999'  (55 = Brasil, 92 = DDD Manaus)
const WPP_NUM = 'SEU_NUMERO_AQUI';
// ============================================================
 
let carrinho = [];
 
function getCardapio(tipo){return JSON.parse(localStorage.getItem('kariboka_'+tipo)||'[]')}
 
function trocarTab(nome,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-'+nome).classList.add('active');
}
 
function renderGrid(tipo){
  const arr=getCardapio(tipo);
  const el=document.getElementById('grid-'+tipo);
  el.innerHTML='';
  if(!arr.length){el.innerHTML=`<div class="vazio">Nenhum item disponível no momento.<br><span style="font-size:0.8rem;opacity:0.5">Volte em breve!</span></div>`;return;}
  arr.forEach(item=>{
    const div=document.createElement('div');
    div.className='item-card';
    div.innerHTML=`
      ${item.img?`<img class="card-img" src="${item.img}" alt="${item.nome}" onerror="this.outerHTML='<div class=card-img-ph>🍃</div>'">`:`<div class="card-img-ph">🍃</div>`}
      <div class="card-body">
        <div class="card-cat">${item.cat}</div>
        <div class="card-nome">${item.nome}</div>
        <div class="card-desc">${item.desc||''}</div>
        <div class="card-footer">
          <div class="card-preco">R$ ${parseFloat(item.preco).toFixed(2)}</div>
          <button class="btn-add-card" onclick="addCarrinho('${item.id}','${tipo}')">+ Adicionar</button>
        </div>
      </div>`;
    el.appendChild(div);
  });
}
 
function addCarrinho(id,tipo){
  const item=getCardapio(tipo).find(i=>i.id===id);
  if(!item)return;
  const ex=carrinho.find(i=>i.id===id);
  if(ex){ex.qty++}else{carrinho.push({...item,qty:1})}
  atualizarBadge();
  animarBadge();
}
 
function atualizarBadge(){
  const total=carrinho.reduce((s,i)=>s+i.qty,0);
  document.getElementById('cart-badge').textContent=total;
}
 
function animarBadge(){
  const b=document.getElementById('cart-badge');
  b.style.transform='scale(1.5)';
  setTimeout(()=>b.style.transform='scale(1)',250);
}
 
function abrirCarrinho(){
  document.getElementById('drawer-bg').classList.add('show');
  document.getElementById('drawer').classList.add('open');
  renderCarrinho();
}
 
function fecharCarrinho(){
  document.getElementById('drawer-bg').classList.remove('show');
  document.getElementById('drawer').classList.remove('open');
}
 
function renderCarrinho(){
  const el=document.getElementById('drawer-items');
  el.innerHTML='';
  if(!carrinho.length){
    el.innerHTML='<div class="carrinho-vazio">Seu carrinho está vazio.<br><span style="font-size:0.8rem">Adicione itens do cardápio!</span></div>';
    document.getElementById('total-val').textContent='R$ 0,00';
    return;
  }
  carrinho.forEach(item=>{
    const div=document.createElement('div');
    div.className='cart-item';
    div.innerHTML=`
      ${item.img?`<img class="cart-img" src="${item.img}" alt="${item.nome}" onerror="this.outerHTML='<div class=cart-img-ph>🍃</div>'">`:`<div class="cart-img-ph">🍃</div>`}
      <div class="cart-info">
        <div class="cart-nome">${item.nome}</div>
        <div class="cart-preco">R$ ${(item.preco*item.qty).toFixed(2)}</div>
      </div>
      <div class="cart-qty">
        <button class="qty-btn" onclick="changeQty('${item.id}',-1)">−</button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn" onclick="changeQty('${item.id}',1)">+</button>
      </div>`;
    el.appendChild(div);
  });
  const total=carrinho.reduce((s,i)=>s+(i.preco*i.qty),0);
  document.getElementById('total-val').textContent='R$ '+total.toFixed(2).replace('.',',');
}
 
function changeQty(id,delta){
  const idx=carrinho.findIndex(i=>i.id===id);
  if(idx===-1)return;
  carrinho[idx].qty+=delta;
  if(carrinho[idx].qty<=0)carrinho.splice(idx,1);
  atualizarBadge();
  renderCarrinho();
}
 
function enviarWhatsApp(){
  const nome=document.getElementById('cli-nome').value.trim();
  const mesa=document.getElementById('cli-mesa').value.trim();
  if(!nome||!mesa){alert('Por favor informe seu nome e número da mesa.');return;}
  if(!carrinho.length){alert('Adicione itens ao carrinho antes de enviar.');return;}
  const total=carrinho.reduce((s,i)=>s+(i.preco*i.qty),0);
  let msg='✦ *PEDIDO KARIBOKA* ✦\n\n';
  msg+='👤 *Cliente:* '+nome+'\n';
  msg+='🪑 *Mesa:* '+mesa+'\n\n';
  msg+='*Itens do Pedido:*\n';
  carrinho.forEach(i=>{msg+='• '+i.qty+'x '+i.nome+' — R$ '+(i.preco*i.qty).toFixed(2)+'\n'});
  msg+='\n💰 *Total: R$ '+total.toFixed(2)+'*';
  const url='https://wa.me/'+WPP_NUM+'?text='+encodeURIComponent(msg);
  window.open(url,'_blank');
}
 
renderGrid('comidas');
renderGrid('bebidas');
</script>
</body>
</html>
